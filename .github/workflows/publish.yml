name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-whl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Verify version matches pyproject.toml
        run: |
          POM_VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])")
          echo "Tag version: $VERSION"
          echo "pyproject.toml version: $POM_VERSION"
          if [ "$VERSION" != "$POM_VERSION" ]; then
            echo "ERROR: Tag version ($VERSION) does not match pyproject.toml ($POM_VERSION)"
            echo "Please update pyproject.toml before tagging!"
            exit 1
          fi

      - name: Build whl
        run: python -m build

      - name: Upload whl artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-feishu-bridge-whl
          path: dist/*.whl
          retention-days: 1

  publish-whl:
    needs: [build-whl]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download whl artifact
        uses: actions/download-artifact@v4
        with:
          name: cc-feishu-bridge-whl
          path: dist/

      - name: List dist contents
        run: ls -la dist/ && echo "Whl files:" && ls -la dist/*.whl

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload whl to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*.whl
          draft: false
          prerelease: false
